name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Run Python tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD\src"
          python -m unittest discover -s tests -v

      - name: Install backend packager
        run: python -m pip install pyinstaller

      - name: Build backend sidecar
        shell: pwsh
        run: .\packaging\build-sidecar.ps1 -Python python

      - name: Build frontend
        working-directory: desktop
        run: npm run build

      - name: Build Windows installer
        working-directory: desktop
        run: npm run tauri build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-obsidian-md-windows
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/release/bundle/nsis/*.exe
