[paths]
queue_db = "./data/queue.sqlite"
cache_dir = "./cache"

[obsidian]
mode = "local"
vault_path = "./sample-vault"
folder = "Inbox/Learning Inbox"
rest_base_url = "http://127.0.0.1:27123"
rest_api_key = ""

[tools]
yt_dlp = "yt-dlp"
ffmpeg = "ffmpeg"
douyin_downloader = "douyin-downloader"
douyin_config = ""
whisper = "whisper"
funasr = "funasr"
ocr = "builtin"

[llm]
enabled = false
provider = "openai-compatible"
base_url = "https://api.openai.com/v1"
api_key = ""
model = "gpt-4o-mini"
language = "zh-CN"

[outputs]
formats = ["markdown"]
html_dir = "./exports/html"
csv_path = "./exports/notes-index.csv"
notion_token = ""
notion_database_id = ""
notion_title_property = "Name"
notion_api_base = "https://api.notion.com/v1"

[prompt]
active_template = "learning"
custom_instruction = ""

[note_template]
active_template = "study_note"
include_transcript = true
include_source_notes = true
attribution_name = "小黄狗"
custom_structure = ""

[routing]
enabled = true
fallback_folder = "Inbox/Learning Inbox"
allowed_folders = [
    "AI学习",
    "考研资料汇总",
    "炒股与量化学习",
    "研后/英语学习",
    "工作",
    "Life",
    "Inbox/Learning Inbox",
]
